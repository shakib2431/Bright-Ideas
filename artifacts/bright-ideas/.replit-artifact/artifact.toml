kind = "web"
previewPath = "/"
title = "Bright Ideas"
version = "1.0.0"
id = "artifacts/bright-ideas"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21770

[services.development]
run = "pnpm --filter @workspace/bright-ideas run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bright-ideas", "run", "build" ]
serve = "static"
publicDir = "artifacts/bright-ideas/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21770"
BASE_PATH = "/"
